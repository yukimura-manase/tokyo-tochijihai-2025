[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v 
    --tb=short 
    --strict-markers
    --disable-warnings
markers =
    health: Health check and service availability tests
    chat: Chat endpoint tests
    rag: RAG (Retrieval Augmented Generation) endpoint tests
    streaming: Streaming response tests
    integration: Integration tests requiring Docker services
    slow: Tests that take a long time to run
asyncio_mode = auto
timeout = 120